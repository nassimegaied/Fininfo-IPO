spring.application.name=ipo-backend

# ─── Server ──────────────────────────────────────────────────────────────────
server.port=8081

# ─── PostgreSQL ──────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ipo_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── Keycloak / OAuth2 Resource Server ───────────────────────────────────────
# The issuer URI must match what's inside your JWT tokens (iss claim).
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/ipo-realm}

# ─── CORS (allow the React dev server) ───────────────────────────────────────
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
